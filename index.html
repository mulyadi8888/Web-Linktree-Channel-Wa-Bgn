<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saluran WhatsApp BGN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b, #0f766e);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: white;
      }

      .container {
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 35px 25px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .logo {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.2);
        object-fit: cover;
        margin-bottom: 18px;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: #d1d5db;
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .link-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 16px;
        margin-bottom: 16px;
        border-radius: 18px;
        text-decoration: none;
        color: white;
        font-weight: 600;
        font-size: 15px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
      }

      .link-btn:hover {
        transform: translateY(-4px) scale(1.02);
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
      }

      .link-btn img {
        width: 24px;
        height: 24px;
      }

      .footer {
        margin-top: 25px;
        font-size: 12px;
        color: #cbd5e1;
        opacity: 0.8;
      }

      @media (max-width: 480px) {
        .container {
          padding: 28px 20px;
        }

        h1 {
          font-size: 24px;
        }

        .link-btn {
          font-size: 14px;
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
        alt="Logo"
      />

      <h1>Saluran WA BGN</h1>

      <p class="subtitle">
        Informasi resmi Program MBG dan SPPG.<br />
        Silakan pilih saluran WhatsApp di bawah ini.
      </p>

      <a
        class="link-btn"
        href="https://whatsapp.com/channel/0029Vb73jLQ4o7qDTSkHW62S"
        target="_blank"
      >
        📢 BADAN GIZI NASIONAL
      </a>

      <a
        class="link-btn"
        href="https://whatsapp.com/channel/0029VbBgYgo7j6g5JgYoE53w"
        target="_blank"
      >
        📢 KPPG BGN Bandung
      </a>

      <a
        class="link-btn"
        href="https://whatsapp.com/channel/0029VbBbS4oCcW4kufddvg1z"
        target="_blank"
      >
        📢 Pengawas Keuangan BGN
      </a>

      <a
        class="link-btn"
        href="https://whatsapp.com/channel/0029VbBiFJpJJhzTTDMKKr1N"
        target="_blank"
      >
        📢 Helpdesk Resmi Penyaluran Operasional SPPG BGN
      </a>

      <a
        class="link-btn"
        href="https://whatsapp.com/channel/0029Vb6hQau8vd1XBtElG02d"
        target="_blank"
      >
        📢 SPPI BGN
      </a>

      <div class="footer">© Mul3Reot BGN • Semua Informasi Terupdate</div>
    </div>
  </body>
</html>
